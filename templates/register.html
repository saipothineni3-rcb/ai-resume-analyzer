<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/register.css') }}">
</head>

<body>

<div class="container">

    <!-- Left Side -->
    <div class="left-panel">

        <div class="logo">
            AI Resume Analyzer
        </div>

        <h1>Create Your Account</h1>

        <p>
            Upload your resume, analyze ATS score,
            discover missing skills, and get AI-powered
            recommendations.
        </p>

        <a href="/login" class="login-btn">
            Already have an account?
        </a>

    </div>

    <!-- Right Side -->
    <div class="right-panel">

        <div class="form-box">

            <h2>Sign Up</h2>

            <form method="POST">

    <input
        type="text"
        name="name"
        placeholder="Full Name"
        required>

    <input
        type="email"
        name="email"
        placeholder="Email Address"
        required>

    <input
        type="text"
        name="phone"
        placeholder="Phone Number"
        required>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <button type="submit">
        Create Account
    </button>

</form>

        </div>

    </div>

</div>

</body>
</html>
