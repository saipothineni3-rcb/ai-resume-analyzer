<!DOCTYPE html>
<html>
<head>
    <meta name="viewport"
      content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Forgot Password</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/forgot_password.css') }}"
    >

</head>

<body>

<div class="container">

    <div class="left">

        <h1>Reset Password</h1>

        <p>
            Verify your registered phone number
            and create a new password for your
            account.
        </p>

    </div>

    <div class="right">

        <div class="form-box">

            <h2>Forgot Password</h2>

            <form method="POST">

                <input
                    type="email"
                    name="email"
                    placeholder="Registered Email"
                    required
                >

                <input
                    type="text"
                    name="phone"
                    placeholder="Registered Phone Number"
                    required
                >

                <input
                    type="password"
                    name="new_password"
                    placeholder="New Password"
                    required
                >

                <button type="submit">
                    Reset Password
                </button>

            </form>

            {% if error %}
                <p class="error">
                    {{ error }}
                </p>
            {% endif %}

            <a
                href="{{ url_for('login') }}"
                class="back-btn"
            >
                Back to Login
            </a>

        </div>

    </div>

</div>

</body>
</html>
