<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
</head>
<body>

<h2>Reset Password</h2>

<form method="POST">

    <input
        type="email"
        name="email"
        placeholder="Registered Email"
        required>

    <br><br>

    <input
        type="text"
        name="phone"
        placeholder="Registered Phone Number"
        required>

    <br><br>

    <input
        type="password"
        name="new_password"
        placeholder="New Password"
        required>

    <br><br>

    <button type="submit">
        Reset Password
    </button>

</form>

{% if error %}
<p style="color:red;">
    {{ error }}
</p>
{% endif %}

</body>
</html>
