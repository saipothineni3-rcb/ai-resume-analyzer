<!DOCTYPE html>
<html>
<head>

    <title>Edit Profile</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/edit_profile.css') }}">

</head>

<body>

<div class="container">

    <div class="form-box">

        <h1>Edit Profile</h1>

        <form method="POST">

            <input
                type="text"
                name="name"
                value="{{ user.name }}"
                required>

            <input
                type="email"
                name="email"
                value="{{ user.email }}"
                required>

            <input
                type="text"
                name="phone"
                value="{{ user.phone }}"
                required>

            <button type="submit">

                Save Changes

            </button>

        </form>

    </div>

</div>

</body>
</html>
