<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Edit Profile</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/edit_profile.css') }}">

</head>

<body>

<div class="container">

    <div class="form-box">

        <h1>Edit Profile</h1>

        <form method="POST">

            <input
                type="text"
                name="name"
                value="{{ user.name }}"
                required>

            <input
                type="email"
                name="email"
                value="{{ user.email }}"
                required>

            <input
                type="text"
                name="phone"
                value="{{ user.phone }}"
                required>

            <button type="submit">

                Save Changes

            </button>

        </form>

    </div>

</div>

</body>
</html>
