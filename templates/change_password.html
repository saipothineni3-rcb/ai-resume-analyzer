<!DOCTYPE html>
<html>
<head>

    <title>Change Password</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='css/edit_profile.css') }}">

</head>

<body>

<div class="container">

    <div class="form-box">

        <h1>Change Password</h1>

        {% if error %}
        <p style="color:red;">
            {{ error }}
        </p>
        {% endif %}

        <form method="POST">

            <input
                type="password"
                name="current_password"
                placeholder="Current Password"
                required>

            <input
                type="password"
                name="new_password"
                placeholder="New Password"
                required>

            <button type="submit">
                Update Password
            </button>

        </form>

    </div>

</div>

</body>
</html>
